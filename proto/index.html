<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>KnowledgeRecorder 原型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 200px; background: #1e1e2e; color: #cdd6f4;
      padding: 20px; display: flex; flex-direction: column;
    }
    .sidebar h2 { font-size: 16px; margin-bottom: 20px; }
    .sidebar button {
      background: #45475a; color: #cdd6f4; border: none;
      padding: 8px 12px; border-radius: 6px; margin-bottom: 8px;
      cursor: pointer; text-align: left; font-size: 13px;
    }
    .sidebar button:hover { background: #585b70; }
    .main {
      flex: 1; display: flex; flex-direction: column;
    }
    .toolbar {
      padding: 12px 20px; background: #fff; border-bottom: 1px solid #ddd;
      display: flex; align-items: center; gap: 12px;
    }
    .toolbar input[type="text"] {
      flex: 1; padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 18px; font-weight: bold; outline: none;
    }
    .toolbar button {
      padding: 6px 16px; background: #1e66f5; color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
    }
    .editor-area {
      flex: 1; display: flex; overflow: hidden;
    }
    .editor-area textarea {
      flex: 1; border: none; padding: 20px; font-size: 15px;
      line-height: 1.7; resize: none; outline: none; font-family: inherit;
    }
    .preview {
      flex: 1; padding: 20px; background: #fff; overflow-y: auto;
      line-height: 1.7; border-left: 1px solid #eee;
    }
    .preview h1 { font-size: 24px; margin-bottom: 12px; }
    .preview h2 { font-size: 20px; margin: 16px 0 8px; }
    .preview p { margin: 8px 0; }
    .preview code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
    .preview pre { background: #1e1e2e; color: #cdd6f4; padding: 14px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
    .preview blockquote { border-left: 3px solid #1e66f5; padding-left: 14px; color: #666; margin: 10px 0; }
    .preview ul { padding-left: 24px; }
    .preview li { margin: 4px 0; }
    .preview img { max-width: 100%; border-radius: 8px; }
    .preview a { color: #1e66f5; }
    .statusbar {
      padding: 6px 16px; background: #fff; border-top: 1px solid #ddd;
      font-size: 12px; color: #999; display: flex; gap: 16px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>📝 KnowledgeRecorder</h2>
    <button onclick="newPost()">+ 新建博文</button>
    <button onclick="showAll()" style="background:#1e66f5">全部博文</button>
    <button>🏷️ 工作</button>
    <button>🏷️ 学习</button>
    <button>🏷️ 生活</button>
    <div style="flex:1"></div>
    <button style="font-size:11px;color:#888">🔍 搜索...</button>
  </div>

  <div class="main" id="app">
    <div class="toolbar">
      <input type="text" placeholder="博文标题..." id="titleInput" oninput="render()">
      <select id="dateSelect" onchange="render()" style="padding:6px;border:1px solid #ddd;border-radius:6px"></select>
      <button onclick="savePost()">💾 保存</button>
      <button onclick="toggleView()" id="viewBtn">👁️ 预览</button>
    </div>
    <div class="editor-area" id="editorArea">
      <textarea id="mdInput" placeholder="开始写作...支持 Markdown 语法&#10;&#10;# 标题&#10;**粗体** *斜体*&#10;- 列表项" oninput="render()"></textarea>
      <div class="preview" id="preview" style="display:none"></div>
    </div>
    <div class="statusbar">
      <span id="wordCount">0 字</span>
      <span id="saveStatus">未保存</span>
      <span>Ctrl+/ 切换源码 · 自动保存</span>
    </div>
  </div>

  <script>
    // ========== 简易 Markdown 渲染 ==========
    function mdToHtml(md) {
      let h = escapeHtml(md)
      // 代码块
      h = h.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      h = h.replace(/`([^`]+)`/g, '<code>$1</code>')
      // 标题
      h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>')
      h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>')
      h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>')
      // 粗体/斜体
      h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      h = h.replace(/\*(.+?)\*/g, '<em>$1</em>')
      // 图片
      h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
      // 链接
      h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
      // 水平线
      h = h.replace(/^---$/gm, '<hr>')
      // 引用
      h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      // 无序列表
      h = h.replace(/^- (.+)$/gm, '<li>$1</li>')
      h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
      // 段落
      h = h.replace(/\n\n/g, '</p><p>')
      h = h.replace(/\n/g, '<br>')
      return '<p>' + h + '</p>'
    }
    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }
    function render() {
      const md = document.getElementById('mdInput').value
      document.getElementById('preview').innerHTML = mdToHtml(md)
      document.getElementById('wordCount').textContent =
        md.replace(/\s/g,'').length + ' 字'
    }

    // ========== 视图切换 ==========
    let showingPreview = false
    function toggleView() {
      showingPreview = !showingPreview
      const ta = document.getElementById('mdInput')
      const pv = document.getElementById('preview')
      const btn = document.getElementById('viewBtn')
      if (showingPreview) {
        ta.style.display = 'none'
        pv.style.display = 'block'
        btn.textContent = '📝 源码'
      } else {
        ta.style.display = 'block'
        pv.style.display = 'none'
        btn.textContent = '👁️ 预览'
      }
    }

    // ========== 日期选择 ==========
    const dateSelect = document.getElementById('dateSelect')
    for (let i = -7; i <= 0; i++) {
      const d = new Date()
      d.setDate(d.getDate() + i)
      const v = d.toISOString().split('T')[0]
      const opt = document.createElement('option')
      opt.value = v
      opt.textContent = v + (i === 0 ? ' (今天)' : '')
      if (i === 0) opt.selected = true
      dateSelect.appendChild(opt)
    }

    // ========== 键盘快捷键 ==========
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === '/') {
        e.preventDefault()
        toggleView()
      }
    })

    // ========== 占位功能 ==========
    function newPost() { alert('新建博文 — 后续阶段实现') }
    function showAll() { alert('博文列表 — 后续阶段实现') }
    function savePost() {
      document.getElementById('saveStatus').textContent = '已保存 ' + new Date().toLocaleTimeString()
    }

    // 初始渲染
    render()
  </script>
</body>
</html>
